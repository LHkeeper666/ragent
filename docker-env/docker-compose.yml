name: ragent-middleware

services:
  # ==================== PostgreSQL + pgvector ====================
  postgres:
    image: pgvector/pgvector:pg16
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ragent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ragent"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== Redis ====================
  redis:
    image: redis:latest
    container_name: redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass "123456"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "123456", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== RocketMQ ====================
  rmqnamesrv:
    image: apache/rocketmq:5.2.0
    container_name: rmqnamesrv
    ports:
      - "9876:9876"
    environment:
      JAVA_OPT_EXT: "-Xms256m -Xmx400m"
    command: sh mqnamesrv
    networks:
      - rocketmq
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "grep -q 'The Name Server boot success' /home/rocketmq/logs/rocketmqlogs/namesrv.log || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  rmqbroker:
    image: apache/rocketmq:5.2.0
    container_name: rmqbroker
    ports:
      - "10912:10912"
      - "10911:10911"
      - "10909:10909"
      - "8080:8080"
      - "8081:8081"
      - "8082:8082"
    environment:
      NAMESRV_ADDR: "rmqnamesrv:9876"
      JAVA_OPT_EXT: "-Xms512m -Xmx512m"
    depends_on:
      rmqnamesrv:
        condition: service_healthy
    command:
      - sh
      - -c
      - |
        cat > /home/rocketmq/rocketmq-5.2.0/conf/broker.conf << EOF
        brokerClusterName = DefaultCluster
        brokerName = broker-a
        brokerId = 0
        deleteWhen = 04
        fileReservedTime = 48
        brokerRole = ASYNC_MASTER
        flushDiskType = ASYNC_FLUSH
        brokerIP1 = 127.0.0.1
        timerMaxDelaySec = 31622400
        EOF
        sh mqbroker --enable-proxy \
          -c /home/rocketmq/rocketmq-5.2.0/conf/broker.conf
    networks:
      - rocketmq
    restart: unless-stopped

  rocketmq-dashboard:
    image: apacherocketmq/rocketmq-dashboard:2.1.0
    container_name: rocketmq-dashboard
    network_mode: "service:rmqbroker"
    environment:
      JAVA_OPTS: >-
        -Xms256m -Xmx512m
        -XX:MaxMetaspaceSize=256m
        -Drocketmq.config.enableDashBoardCollect=false
        -Drocketmq.namesrv.addr=rmqnamesrv:9876
        -Dserver.port=8082
    depends_on:
      rmqbroker:
        condition: service_started
    restart: unless-stopped

  # ==================== RustFS ====================
  rustfs:
    image: rustfs/rustfs:1.0.0-alpha.72
    container_name: rustfs
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      RUSTFS_ACCESS_KEY: rustfsadmin
      RUSTFS_SECRET_KEY: rustfsadmin
      RUSTFS_CONSOLE_ENABLE: "true"
    volumes:
      - rustfs-data:/data
    command: --address :9000 --console-enable --access-key rustfsadmin --secret-key rustfsadmin /data
    restart: unless-stopped

volumes:
  pgdata:
  rustfs-data:

networks:
  rocketmq:
    driver: bridge
